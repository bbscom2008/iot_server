<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <!-- 禁止浏览器自动缩放 -->
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    
    <!-- 缓存控制 -->
    <meta http-equiv="Cache-Control" content="max-age=7200">
    <meta http-equiv="Expires" content="0">
    
    
    <!-- ⭐ 关键CSS内联 - 优化首屏渲染 -->
    <style>
      /* 首屏关键样式 - 避免等待CSS文件加载 */
      #app {
        font-size: 3.73rem;
        min-height: 100vh;
      }
      .container {
        width: 100%;
        min-height: 100vh;
      }
      .preview {
        width: 100vw;
        min-height: 100vh;
        background-color: #f1f1f1;
      }
      .main {
        width: 106.67rem;
        max-width: 100vw;
        margin: 0 auto;
        /* padding: 0 2.67rem 5.33rem; */
        background-color: #f1f1f1; /* 先显示纯色背景 */
      }
      /* 订单金额 - 最关键的内容 */
      .order-money-box {
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 2.67rem 0;
      }
      .order-money {
        color: #ff3b30;
        font-weight: bold;
        font-size: 8rem;
      }
      /* 支付按钮 - 关键交互元素 */
      .el-button--primary {
        background-color: #409EFF;
        border-color: #409EFF;
        color: #FFF;
        padding: 12px 20px;
        font-size: 14px;
        border-radius: 4px;
      }

      #global-skeleton {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 18px;
        background: #f5f7fa;
        z-index: 9999;
        transition: opacity 0.3s ease;
      }

      #global-skeleton.fade-out {
        opacity: 0;
        pointer-events: none;
      }

      #global-skeleton .indicator {
        display: flex;
        gap: 12px;
      }

      #global-skeleton .indicator .dot {
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: #409eff;
        opacity: 0.2;
        animation: skeleton-pulse 1s infinite ease-in-out;
      }

      #global-skeleton .indicator .dot:nth-child(2) {
        animation-delay: 0.15s;
      }

      #global-skeleton .indicator .dot:nth-child(3) {
        animation-delay: 0.3s;
      }

      #global-skeleton .message {
        font-size: 16px;
        color: #303133;
        letter-spacing: 1px;
      }

      @keyframes skeleton-pulse {
        0%, 80%, 100% {
          opacity: 0.2;
          transform: scale(1);
        }
        40% {
          opacity: 1;
          transform: scale(1.3);
        }
      }
    </style>
    
    <link rel="icon" href="<%= BASE_URL %>favicon.ico">
    <title><%= webpackConfig.name %></title>
  </head>
  <body>
    <noscript>
      <strong>We're sorry but <%= webpackConfig.name %> doesn't work properly without JavaScript enabled. Please enable it to continue.</strong>
    </noscript>
    <div id="global-skeleton">
      <div class="indicator">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <p class="message">正在为您确认订单信息...</p>
    </div>
    <div id="app"></div>
    <!-- built files will be auto injected -->
  </body>
</html>
